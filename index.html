<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szymon Gerasimuk | ASTERSYSTEMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette derived from ASTERSYSTEMS Logo */
            --primary-blue: #6B7FD7; 
            --accent-blue: #89B4FA;
            --bg-creamy: #FCF9F1;
            --card-white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp-green: #25D366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-creamy);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        /* Business Card Container */
        .card {
            background: var(--card-white);
            border: 1px solid rgba(107, 127, 215, 0.1);
            padding: 40px 30px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            /* Soft layered shadow for physical card look */
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.05),
                0 20px 40px -10px rgba(107, 127, 215, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        /* Logo Styling */
        .logo-container {
            width: 100%;
            max-width: 220px;
            margin: 0 auto 25px auto;
        }
        
        .logo-container img {
            width: 100%;
            height: auto;
        }

        /* Identity Details */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* Info Rows */
        .info-container {
            margin-bottom: 30px;
            text-align: left;
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(107, 127, 215, 0.05);
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-item i {
            width: 24px;
            margin-top: 3px;
            font-size: 1rem;
            color: var(--primary-blue);
            margin-right: 15px;
        }

        .info-item span {
            color: var(--text-muted);
            line-height: 1.5;
            font-weight: 400;
        }

        /* Action Buttons */
        .cta-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }

        .btn-email {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(107, 127, 215, 0.2);
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: scale(1.02);
        }

        /* Footer Attribution */
        .footer-text {
            margin-top: 25px;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        @media (max-width: 360px) {
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="logo.png" alt="ASTERSYSTEMS LLC">
        </div>
        
        <h1>Szymon Gerasimuk</h1>
        <p class="subtitle">Chief Executive Officer</p>
        
        <div class="info-container">
            <div class="info-item">
                <i class="fa-solid fa-phone"></i>
                <span>+1 (623) 521-8157</span>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>1209 Mountain Road Place NE, Suite R<br>Albuquerque, NM 87110</span>
            </div>
        </div>

        <div class="cta-container">
            <a href="https://wa.me/16235218157" target="_blank" class="btn btn-whatsapp">
                <i class="fa-brands fa-whatsapp fa-lg"></i> Message on WhatsApp
            </a>
            
            <a href="mailto:szymon@aster-systems.com" class="btn btn-email">
                <i class="fa-regular fa-envelope fa-lg"></i> Send an Email
            </a>
        </div>

        <p class="footer-text">ASTERSYSTEMS LLC</p>
    </div>

</body>
</html>
